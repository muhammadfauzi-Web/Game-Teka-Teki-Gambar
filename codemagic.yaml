workflows:
  teka-teki-gambar-android:
    name: Teka-Teki Gambar - Android Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      node: 20
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
      cancel_previous_builds: true

    scripts:
      - name: Install Cordova CLI
        script: |
          npm install -g cordova@13.0.0

      - name: Setup and Build Android App (Debug Mode)
        script: |
          cordova platform add android@13.0.0
          cordova build android --debug

    artifacts:
      - 'platforms/android/app/build/outputs/apk/debug/*.apk'

    publishing:
      email:
        recipients:
          - muhammadfauziarrasyid@gmail.com
        notify:
          success: true
          failure: false
